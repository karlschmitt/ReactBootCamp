<!DOCTYPE html>
<html>
  <head>
    <title>Without JSX - Matrix Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-black m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      // 1. Create the Heading with Matrix styling
      const heading = React.createElement(
        'h1', 
        { className: 'text-[#00ff41] font-mono text-6xl drop-shadow-[0_0_10px_#00ff41]' }, 
        'I do not use JSX!'
      );

      // 2. Create a Container to center the heading
      const container = React.createElement(
        'div',
        { className: 'flex h-screen items-center justify-center bg-black' },
        heading
      );

      const root = ReactDOM.createRoot(document.getElementById('root'));
      
      // 3. Render the container
      root.render(container);
    </script>
  </body>
</html>
