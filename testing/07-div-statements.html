<!DOCTYPE html>
<html>

  <head>
    <title>Block of HTML</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
 
  <body class="bg-black m-0 p-0">

    <div id="root"></div>
    <!-- Load React, ReactDOM, and Babel (to handle JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      // PASTE YOUR SNIPPET HERE

      function MyFirstComponent() {
        return <h1>React and Tailwindcss works!&#128119; </h1>;
      }

      function MySecondComponent() {

          const reply = (
                <div className="flex h-screen items-center justify-center bg-black">
                  <div className="text-[#00ff41] font-mono text-5xl font-bold uppercase tracking-widest">
                    <MyFirstComponent />
                  </div>
                </div> );

        return reply;
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<MySecondComponent />);
    </script>
  </body>
</html>
