<!DOCTYPE html>
<html>

  <head>
    <title>Expressions in JSX</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-black m-0 p-0 overflow-hidden">

    <div id="root"></div>
    <!-- Load React, ReactDOM, and Babel (to handle JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      // PASTE YOUR SNIPPET HERE
      function MyJsxComponent() {

        const reply = <div className="flex h-screen items-center justify-center bg-black">
                        <h1 className="text-[#00ff41] text-5xl font-mono font-bold uppercase tracking-widest drop-shadow-[0_0_15px_#00ff41]">                     
                            React is {8 + 2} times better with JSX!✨
                        </h1>
                      </div>;
        
        return reply;
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<MyJsxComponent />);

    </script>
  </body>
</html>
