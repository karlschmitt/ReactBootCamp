<!DOCTYPE html>
<html>
  <head>
    <title>JSX</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-black m-0 p-0">
    <div id="root"></div>
    <!-- Load React, ReactDOM, and Babel (to handle JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      function MyFirstJsxComponent() {

        return (
          <h1 className="text-[#00ff41] text-7xl font-mono font-bold tracking-widest drop-shadow-[0_0_15px_#00ff41]">
            I love JSX! 
          </h1>
        );
      }

      function MySecondJsxComponent() {

        return (
          <div className="flex h-screen items-center justify-center bg-black">
            <MyFirstJsxComponent />   
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<MySecondJsxComponent />);

    </script>
  </body>
</html>
